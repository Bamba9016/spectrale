# fly.toml app configuration file generated for spectrale on 2026-06-06T12:57:42Z

app = 'spectrale'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000           # ← modifié pour correspondre à $PORT
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  [http_service.tcp_checks]      # ← ajouté
    interval = 10000             # 10 secondes entre les checks
    timeout = 20000              # 20 secondes pour répondre
    grace_period = "30s"         # délai après démarrage

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
